name: KURGIN Backend CI / Deploy Readiness

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Lint, smoke test, Docker build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fastapi_skeleton
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: fastapi_skeleton/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with Ruff
        run: ruff check app tools

      - name: Smoke test
        env:
          KURGIN_ENVIRONMENT: development
          KURGIN_DATABASE_URL: sqlite:///./data/ci_kurgin_auth_mvp.sqlite3
          KURGIN_JWT_SECRET: ci-only-secret-change-in-deploy-32chars
          KURGIN_ALLOWED_ORIGINS: https://kurgin-website.vercel.app,https://cvdrap.ru,http://localhost:3000
        run: python tools/local_smoke_test.py

      - name: Build Docker image
        working-directory: .
        run: docker build -t kurgin-backend-auth-mvp:ci ./fastapi_skeleton

  render_deploy_hook:
    name: Optional Render deploy hook
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy if hook is configured
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not configured. CI passed; deploy is ready but not triggered."
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
